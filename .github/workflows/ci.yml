name: CI

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install DuckDB CGO prerequisites
        run: sudo apt-get update && sudo apt-get install -y build-essential gcc g++

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Run backend tests
        working-directory: backend
        run: go test ./...

      - name: Validate manifests
        working-directory: backend
        run: go run ./cmd/platformctl validate-manifests

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Run frontend tests
        working-directory: web
        run: npm test

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            target: linux-amd64
          - goos: linux
            goarch: arm64
            target: linux-arm64
          - goos: darwin
            goarch: arm64
            target: darwin-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install DuckDB CGO prerequisites
        run: sudo apt-get update && sudo apt-get install -y build-essential gcc g++

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Cross-compile platformctl
        run: make release-platformctl TARGET_OS=${{ matrix.goos }} TARGET_ARCH=${{ matrix.goarch }} TARGET_DIR=dist/${{ matrix.target }}/bin

      - name: Package release tarball
        run: make package-release TARGET_DIR=dist/${{ matrix.target }} RELEASE_TARBALL=dist/platformctl-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/platformctl-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
