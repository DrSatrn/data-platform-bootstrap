name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.0"
      - name: Run backend tests
        working-directory: backend
        run: |
          go test ./...
          go run ./cmd/platformctl validate-manifests

  frontend:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend dependencies
        working-directory: web
        run: npm install
      - name: Build frontend
        working-directory: web
        run: npm run build

  manifests:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.0"
      - name: Validate manifest loading
        working-directory: backend
        run: go run ./cmd/platformctl validate-manifests
