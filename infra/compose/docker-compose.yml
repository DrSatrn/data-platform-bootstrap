# This Compose file defines the local platform stack with ARM64-friendly images
# and explicit service responsibilities.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform_app
      POSTGRES_PASSWORD: local_dev_password
      POSTGRES_DB: platform
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: golang:1.24-alpine
    command: ["sh", "-c", "go run ./cmd/platform-api"]
    working_dir: /workspace/backend
    environment:
      PLATFORM_ENV: development
      PLATFORM_HTTP_ADDR: :8080
      PLATFORM_WEB_ADDR: :3000
      PLATFORM_API_BASE_URL: http://127.0.0.1:8080
      PLATFORM_LOG_LEVEL: debug
      PLATFORM_POSTGRES_DSN: postgres://platform_app:local_dev_password@postgres:5432/platform?sslmode=disable
      PLATFORM_DUCKDB_PATH: /var/lib/platform/duckdb/platform.duckdb
      PLATFORM_DATA_ROOT: /var/lib/platform/data
      PLATFORM_ARTIFACT_ROOT: /var/lib/platform/artifacts
      PLATFORM_MANIFEST_ROOT: /workspace/packages/manifests
      PLATFORM_SAMPLE_DATA_ROOT: /workspace/packages/sample_data
      PLATFORM_MIGRATIONS_ROOT: /workspace/infra/migrations
      PLATFORM_ADMIN_TOKEN: local-dev-admin-token
      PLATFORM_SCHEDULER_TICK: 15s
      PLATFORM_WORKER_POLL: 5s
      PLATFORM_MAX_CONCURRENT_JOBS: 4
    volumes:
      - ../../:/workspace
      - ../../var:/var/lib/platform
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - postgres

  scheduler:
    image: golang:1.24-alpine
    command: ["sh", "-c", "go run ./cmd/platform-scheduler"]
    working_dir: /workspace/backend
    environment:
      PLATFORM_ENV: development
      PLATFORM_HTTP_ADDR: :8080
      PLATFORM_WEB_ADDR: :3000
      PLATFORM_API_BASE_URL: http://127.0.0.1:8080
      PLATFORM_LOG_LEVEL: debug
      PLATFORM_POSTGRES_DSN: postgres://platform_app:local_dev_password@postgres:5432/platform?sslmode=disable
      PLATFORM_DUCKDB_PATH: /var/lib/platform/duckdb/platform.duckdb
      PLATFORM_DATA_ROOT: /var/lib/platform/data
      PLATFORM_ARTIFACT_ROOT: /var/lib/platform/artifacts
      PLATFORM_MANIFEST_ROOT: /workspace/packages/manifests
      PLATFORM_SAMPLE_DATA_ROOT: /workspace/packages/sample_data
      PLATFORM_MIGRATIONS_ROOT: /workspace/infra/migrations
      PLATFORM_ADMIN_TOKEN: local-dev-admin-token
      PLATFORM_SCHEDULER_TICK: 15s
      PLATFORM_WORKER_POLL: 5s
      PLATFORM_MAX_CONCURRENT_JOBS: 4
    volumes:
      - ../../:/workspace
      - ../../var:/var/lib/platform
    depends_on:
      - postgres

  worker:
    image: golang:1.24-alpine
    command: ["sh", "-c", "go run ./cmd/platform-worker"]
    working_dir: /workspace/backend
    environment:
      PLATFORM_ENV: development
      PLATFORM_HTTP_ADDR: :8080
      PLATFORM_WEB_ADDR: :3000
      PLATFORM_API_BASE_URL: http://127.0.0.1:8080
      PLATFORM_LOG_LEVEL: debug
      PLATFORM_POSTGRES_DSN: postgres://platform_app:local_dev_password@postgres:5432/platform?sslmode=disable
      PLATFORM_DUCKDB_PATH: /var/lib/platform/duckdb/platform.duckdb
      PLATFORM_DATA_ROOT: /var/lib/platform/data
      PLATFORM_ARTIFACT_ROOT: /var/lib/platform/artifacts
      PLATFORM_MANIFEST_ROOT: /workspace/packages/manifests
      PLATFORM_SAMPLE_DATA_ROOT: /workspace/packages/sample_data
      PLATFORM_MIGRATIONS_ROOT: /workspace/infra/migrations
      PLATFORM_ADMIN_TOKEN: local-dev-admin-token
      PLATFORM_SCHEDULER_TICK: 15s
      PLATFORM_WORKER_POLL: 5s
      PLATFORM_MAX_CONCURRENT_JOBS: 4
    volumes:
      - ../../:/workspace
      - ../../var:/var/lib/platform
    depends_on:
      - postgres

  web:
    image: node:22-alpine
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    working_dir: /workspace/web
    volumes:
      - ../../:/workspace
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
