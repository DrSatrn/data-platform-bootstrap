# This manifest defines the first end-to-end personal-finance pipeline. The
# pipeline is intentionally compact but still exercises ingestion, SQL
# transformation, quality checking, and metric publication.
id: personal_finance_pipeline
name: Personal Finance Pipeline
description: Ingests local finance data and publishes curated cashflow metrics.
owner: platform-team
tags:
  - personal-finance
  - v2
schedule:
  cron: "0 */6 * * *"
  timezone: Australia/Brisbane
  catchup: false
  is_paused: false
  description: Refresh the curated personal-finance views every six hours.
jobs:
  - id: ingest_transactions_csv
    name: Ingest Transactions CSV
    type: ingest
    retries: 2
    timeout: 2m
    ingest:
      source_ref: personal_finance/transactions.csv
      target_path: raw/raw_transactions.csv
      artifact_path: raw/raw_transactions.csv
    inputs:
      - sample.transactions_csv
    outputs:
      - raw_transactions
  - id: ingest_account_balances_json
    name: Ingest Account Balances JSON
    type: ingest
    depends_on:
      - ingest_transactions_csv
    retries: 2
    timeout: 2m
    ingest:
      source_ref: personal_finance/account_balances.json
      target_path: raw/raw_account_balances.json
      artifact_path: raw/raw_account_balances.json
    inputs:
      - sample.account_balances_json
    outputs:
      - raw_account_balances
  - id: ingest_budget_rules_json
    name: Ingest Budget Rules JSON
    type: ingest
    depends_on:
      - ingest_account_balances_json
    retries: 1
    timeout: 1m
    ingest:
      source_ref: personal_finance/budget_rules.json
      target_path: raw/raw_budget_rules.json
      artifact_path: raw/raw_budget_rules.json
    inputs:
      - sample.budget_rules_json
    outputs:
      - raw_budget_rules
  - id: build_cashflow_mart
    name: Build Monthly Cashflow Mart
    type: transform_sql
    depends_on:
      - ingest_budget_rules_json
    retries: 1
    timeout: 3m
    transform_ref: transform.monthly_cashflow
    bootstrap:
      - sql_ref: bootstrap.raw_transactions
        placeholder: RAW_TRANSACTIONS_PATH
        source_path: raw/raw_transactions.csv
        required: true
      - sql_ref: bootstrap.raw_account_balances
        placeholder: RAW_ACCOUNT_BALANCES_PATH
        source_path: raw/raw_account_balances.json
        required: true
      - sql_ref: bootstrap.raw_budget_rules
        placeholder: RAW_BUDGET_RULES_PATH
        source_path: raw/raw_budget_rules.json
        required: true
    inputs:
      - raw_transactions
      - raw_account_balances
    outputs:
      - mart_monthly_cashflow
  - id: enrich_transactions_python
    name: Enrich Transactions In Python
    type: transform_python
    depends_on:
      - ingest_budget_rules_json
    retries: 1
    timeout: 2m
    command: python3 tasks/enrich_transactions.py
    inputs:
      - raw_transactions
    outputs:
      - staging_transactions_enriched
  - id: build_intermediate_category_rollup
    name: Build Intermediate Category Rollup
    type: transform_sql
    depends_on:
      - enrich_transactions_python
    retries: 1
    timeout: 2m
    transform_ref: transform.intermediate_category_monthly_rollup
    bootstrap:
      - sql_ref: bootstrap.staging_transactions_enriched
        placeholder: STAGING_TRANSACTIONS_ENRICHED_PATH
        source_path: staging/staging_transactions_enriched.json
        required: true
    inputs:
      - staging_transactions_enriched
    outputs:
      - intermediate_category_monthly_rollup
  - id: build_category_spend_mart
    name: Build Category Spend Mart
    type: transform_sql
    depends_on:
      - build_cashflow_mart
      - build_intermediate_category_rollup
    retries: 1
    timeout: 2m
    transform_ref: transform.category_spend
    inputs:
      - intermediate_category_monthly_rollup
    outputs:
      - mart_category_spend
  - id: build_budget_vs_actual_mart
    name: Build Budget Versus Actual Mart
    type: transform_sql
    depends_on:
      - build_category_spend_mart
    retries: 1
    timeout: 2m
    transform_ref: transform.budget_vs_actual
    inputs:
      - mart_category_spend
      - raw_budget_rules
    outputs:
      - mart_budget_vs_actual
  - id: check_uncategorized_transactions
    name: Check Uncategorized Transactions
    type: quality_check
    depends_on:
      - build_budget_vs_actual_mart
    retries: 0
    timeout: 1m
    inputs:
      - mart_monthly_cashflow
    outputs:
      - quality_uncategorized_transactions
  - id: publish_finance_metrics
    name: Publish Finance Metrics
    type: publish_metric
    depends_on:
      - check_uncategorized_transactions
    retries: 1
    timeout: 1m
    metric_refs:
      - metrics_savings_rate
      - metrics_category_variance
    inputs:
      - mart_monthly_cashflow
      - mart_budget_vs_actual
    outputs:
      - metrics_savings_rate
      - metrics_category_variance
