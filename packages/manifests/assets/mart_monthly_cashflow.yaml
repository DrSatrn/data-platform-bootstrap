# This asset manifest defines the curated mart used by the dashboard and metric
# layer.
id: mart_monthly_cashflow
name: Monthly Cashflow Mart
layer: mart
description: Curated monthly cashflow summary used by reporting and metric publication.
owner: platform-team
kind: table
source_refs:
  - raw_transactions
  - raw_account_balances
quality_check_refs:
  - check_uncategorized_transactions
documentation_refs:
  - doc.mart_monthly_cashflow
freshness:
  expected_within: 6h
  warn_after: 10h
columns:
  - name: month
    type: text
    description: Calendar month in YYYY-MM format.
    is_pii: false
  - name: income
    type: decimal
    description: Total income for the month.
    is_pii: false
  - name: expenses
    type: decimal
    description: Total expenses for the month.
    is_pii: false
  - name: savings_rate
    type: decimal
    description: Ratio of net savings to total income.
    is_pii: false
